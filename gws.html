<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Well Soon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      background: linear-gradient(135deg, #ffd6e7, #f8e8ff, #d7ecff);
      position: relative;
    }

    .heart {
      position: absolute;
      color: rgba(255, 105, 180, 0.7);
      animation: float 6s linear infinite;
      font-size: 20px;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    .card {
      width: 90%;
      max-width: 700px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top-image {
      position: relative;
      height: 240px;height: 320px;
      overflow: hidden;
    }

    .top-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .overlfont-size: 42px;ay h1 {
      font-size: 55px;
      margin-bottom: 15px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .overlay p {
      font-size: 20px;
      max-width: 650px;
      line-height: 1.6padding: 30px 25px;;
    }

    .content {
      padding: 45px 35px;
      text-align: center;
    }

    .message {
      background: rgba(255,255,255,0.55);
     font-size: 18px; padding: 28px;
      border-radius: 25px;
      font-size: 22px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 35px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .mesfont-size: 22px;sage span {
      color: #ff4f8b;
      font-weight: bold;
      font-size: 28px;
    }

    .quote {
      background: linear-gradient(135deg, #ff6fa5, #c86bff);
      color: white;
      padding: 35px;
      border-radius: 30px;
      font-size: 28px;
      line-height: 1.6;
      font-weight: bold;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      animation: glow 3s infinite;
    }

    @keyframes glow {
      0%,100% {
        box-shadow: 0 0 20px rgba(255,105,180,0.3);
      }
      50% {
        box-shadow: 0 0 35px rgba(255,105,180,0.6);
      }
    }

    .btn {
      margin-top: 35px;
      padding: 16px 38px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff4f8b, #ff7eb3);
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(255,105,180,0.3);
    }

    .btn:hover {
      transform: scale(1.08);
    }

    @media(max-width: 768px) {
      .overlay h1 {
        font-size: 38px;
      }

      .overlay p {
        font-size: 16px;
      }

      .message {
        font-size: 18px;
      }

      .quote {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Hearts -->
  <script>
    for (let i = 0; i < 25; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 4) + 's';
      heart.style.fontSize = (15 + Math.random() * 25) + 'px';
      document.body.appendChild(heart);
    }
  </script>

  <div class="card">

    <div class="top-image">
      <img src="Screenshot 2026-05-15 220646.png" alt="photo" />

      <div class="overlay">
        <h1>Cepat Sembuh  zeuss💖</h1>
        <p>
          Biar bisa kt pigi tiong nnton wukong 🌷
        </p>
      </div>
    </div>

    <div class="content">

      <div class="message">
        Aku cuma mau bilang...<br><br>
        Jangan terlalu capek mikirin semuanya yaa 🤍<br>
        Sekarang tugas kamu cuma satu:<br><br>
        <span>sembuh dan tersenyum lagi ✨</span>
      </div>

      <div class="quote">
        “Nanti kalau kamu sembuh,
        kita ke graha tenun💕”
      </div>

      <button class="btn">Kirim Pelukan Virtual 🤍</button>

    </div>
  </div>

</body>
</html>
